name: CF Multi-Namespace Backup (Fixed Key Name)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  backup-kv:
    runs-on: ubuntu-latest
    steps:
      - name: Backup testUser Keys
        run: |
          # --- 配置区 ---
          # 你可以在这里统一修改要备份的键名
          KV_KEY_NAME="testUser"
          
          # 格式为 "NamespaceID:自定义空间名"
          NS_LIST=(
            "${{ secrets.CF_NS_ID_1 }}:StorageA"
            "${{ secrets.CF_NS_ID_2 }}:StorageB"
            "${{ secrets.CF_NS_ID_3 }}:StorageC"
          )
          # --------------

          DATE_STR=$(date +%Y%m%d)
          OLD_DATE_STR=$(date -d '7 days ago' +%Y%m%d)
          
          for ITEM in "${NS_LIST[@]}"; do
            NS_ID=${ITEM%%:*}
            NS_NAME=${ITEM#*:}
            
            if [ -z "$NS_ID" ]; then
              echo "Skipping $NS_NAME: Namespace ID is empty."
              continue
            fi
            
            echo "--- Processing: $NS_NAME (Key: $KV_KEY_NAME) ---"
            CURRENT_FILENAME="${NS_NAME}_${DATE_STR}.json"
            OLD_FILENAME="${NS_NAME}_${OLD_DATE_STR}.json"
            
            # A. 下载数据
            # 注意：URL 最后的 test 已经改为 $KV_KEY_NAME
            curl -f -s -L -X GET "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/storage/kv/namespaces/$NS_ID/values/$KV_KEY_NAME" \
                 -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
                 -o "$CURRENT_FILENAME"
            
            if [ $? -eq 0 ]; then
              echo "Fetch success. Uploading to WebDAV..."
              
              # B. 上传到 WebDAV
              curl -f -s -T "$CURRENT_FILENAME" \
                   -u "${{ secrets.WEBDAV_USERNAME }}:${{ secrets.WEBDAV_PASSWORD }}" \
                   "${{ secrets.WEBDAV_URL }}/$CURRENT_FILENAME"
              
              if [ $? -eq 0 ]; then
                echo "Upload Success. Cleaning up $OLD_FILENAME..."
                # C. 删除 7 天前的备份
                curl -s -u "${{ secrets.WEBDAV_USERNAME }}:${{ secrets.WEBDAV_PASSWORD }}" \
                     -X DELETE "${{ secrets.WEBDAV_URL }}/$OLD_FILENAME"
              else
                echo "::error::WebDAV Upload failed for $NS_NAME"
              fi
            else
              echo "::error::CF Fetch failed for $NS_NAME. Check if key '$KV_KEY_NAME' exists."
            fi
          done
